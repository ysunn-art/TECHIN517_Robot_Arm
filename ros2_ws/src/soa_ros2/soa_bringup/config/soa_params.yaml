# SOA single-arm hardware parameters
# Single source of truth for ports, robot IDs, and calibration directories.
# Calibration files live at: {calibration_dir}/{id}.json
# Example: id="gix-follower1", calibration_dir="/home/ubuntu/soa_dev/huggingface"
#          → reads /home/ubuntu/soa_dev/huggingface/gix-follower1.json

/**:
  ros__parameters:
    follower:
      id: "gix-follower4"
      usb_port: "/dev/ttyACM1"
      calibration_dir: "/home/ubuntu/techin517_final/huggingface/lerobot/calibration/robots/so_follower"

    leader:
      id: "gix-leader3"
      usb_port: "/dev/ttyACM0"
      calibration_dir: "/home/ubuntu/techin517_final/huggingface/lerobot/calibration/teleoperators/so101_leader"
